name: E2E Tests (Local)

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: e2e-local-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The e2e matrix jobs are required status checks, so they must report on
  # every PR. An `on.pull_request.paths` filter would leave them permanently
  # "expected" on PRs that don't touch e2e-relevant paths, blocking merge.
  # Instead the workflow always triggers, this job decides relevance, and the
  # matrix jobs skip when nothing relevant changed — skipped required checks
  # count as satisfied.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check changed paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # HEAD is the PR merge commit; HEAD^1 is the base branch tip, so
          # this diff is exactly the PR's changed files.
          if git diff --name-only HEAD^1 HEAD | grep -qE '^(packages/eve/|apps/fixtures/|e2e/|pnpm-workspace\.yaml$|pnpm-lock\.yaml$|\.github/workflows/e2e-local\.yml$|\.github/scripts/discover-e2e-fixtures\.sh$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  discover-fixtures:
    name: discover-fixtures
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Discover eval fixtures
        id: discover
        run: .github/scripts/discover-e2e-fixtures.sh

  e2e:
    name: e2e-local (${{ matrix.fixture.name }}, ${{ matrix.model.name }})
    runs-on: ubuntu-latest
    needs: [changes, discover-fixtures]
    # No job-level `if`: the stable aggregate check below requires a successful
    # matrix result. Guarding each step lets an irrelevant diff satisfy it in
    # seconds without running setup or evals.
    strategy:
      fail-fast: false
      matrix:
        fixture: ${{ fromJSON(needs.discover-fixtures.outputs.matrix) }}
        model:
          - name: openai-sol
            id: openai/gpt-5.6-sol
          - name: anthropic-opus
            id: anthropic/claude-opus-4.8

    env:
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      EVE_E2E_MODEL: ${{ matrix.model.id }}
      EVE_EVAL_JUNIT_DIR: ${{ github.workspace }}/.junit

    steps:
      - name: Checkout code
        if: needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        if: needs.changes.outputs.relevant == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        if: needs.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build eve package
        if: needs.changes.outputs.relevant == 'true'
        # Full build, not build:js: the deployed/runtime bundles must carry the
        # stamped package version (scripts/stamp-version-tokens.mjs) and docs.
        run: pnpm --filter eve run build

      - name: Build extension fixtures
        if: needs.changes.outputs.relevant == 'true'
        # Extension fixtures ship no committed `dist/`; produce it here so
        # consuming fixtures resolve the built artifacts. `--if-present` skips
        # extension fixtures without a build script. The update re-packs the
        # `file:`-protocol store copies so they pick up the fresh dist —
        # a plain reinstall short-circuits and leaves them stale.
        run: |
          pnpm --filter "./e2e/fixtures/*-extension" run --if-present build
          pnpm --filter dist-extensions update gizmo-extension gadget-extension

      - name: Stage workspace extension fixtures as dist-only
        if: needs.changes.outputs.relevant == 'true'
        # Removing author source proves the workspace consumer discovers and
        # compiles the same agent-shaped dist trees we publish. Toolkit covers
        # the rich TypeScript surface; js-only covers pure JavaScript authoring.
        run: |
          mv e2e/fixtures/toolkit-extension/extension "$RUNNER_TEMP/toolkit-extension-source"
          mv e2e/fixtures/js-only-extension/extension "$RUNNER_TEMP/js-only-extension-source"

      - name: Run fixture evals
        if: needs.changes.outputs.relevant == 'true'
        run: |
          mkdir -p "$EVE_EVAL_JUNIT_DIR"
          cd "${{ matrix.fixture.dir }}"
          pnpm exec eve eval --strict --verbose \
            --junit "$EVE_EVAL_JUNIT_DIR/${{ matrix.fixture.name }}-${{ matrix.model.name }}.xml"

      - name: Upload eval artifacts
        if: (failure()) && needs.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v6
        with:
          name: eval-artifacts-${{ matrix.fixture.name }}-${{ matrix.model.name }}
          path: |
            .junit
            e2e/fixtures/*/.eve/evals
            apps/fixtures/*/.eve/evals
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7

  e2e-required:
    name: e2e-local
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()
    steps:
      - name: Require successful e2e matrix
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ "$E2E_RESULT" != "success" ]; then
            echo "E2E matrix result: $E2E_RESULT"
            exit 1
          fi
